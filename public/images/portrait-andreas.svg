<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0d1f38"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#00d4b4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4b4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="200" x2="600" y2="200" stroke="#00d4b4" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="400" x2="600" y2="400" stroke="#00d4b4" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="600" x2="600" y2="600" stroke="#00d4b4" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#00d4b4" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#00d4b4" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Human silhouette — abstract -->
  <!-- Head -->
  <circle cx="300" cy="260" r="88" fill="#0d2040" stroke="#00d4b4" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Shoulders / Body -->
  <path d="M 120 560 Q 160 460 220 440 Q 260 430 300 428 Q 340 430 380 440 Q 440 460 480 560 Z" fill="#0d2040" stroke="#00d4b4" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Inner ring on head -->
  <circle cx="300" cy="260" r="70" fill="none" stroke="#00d4b4" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Crosshair center -->
  <line x1="292" y1="260" x2="308" y2="260" stroke="#00d4b4" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="300" y1="252" x2="300" y2="268" stroke="#00d4b4" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Label area -->
  <rect x="160" y="680" width="280" height="1" fill="#00d4b4" fill-opacity="0.15"/>

  <text x="300" y="714" text-anchor="middle"
        font-family="'Barlow', 'Helvetica Neue', sans-serif"
        font-size="9" font-weight="400"
        letter-spacing="4" fill="#00d4b4" fill-opacity="0.55">
    PORTRAIT FOLGT
  </text>
  <text x="300" y="735" text-anchor="middle"
        font-family="'Barlow', 'Helvetica Neue', sans-serif"
        font-size="10" font-weight="600"
        letter-spacing="2" fill="rgba(255,255,255,0.35)">
    Andreas Linder — Gründer LinderMedia
  </text>

  <!-- Corner marks -->
  <path d="M 32 32 L 32 56" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M 32 32 L 56 32" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M 568 32 L 568 56" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M 568 32 L 544 32" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M 32 768 L 32 744" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M 32 768 L 56 768" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M 568 768 L 568 744" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M 568 768 L 544 768" stroke="#00d4b4" stroke-opacity="0.2" stroke-width="1"/>
</svg>
